<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SSG counter</title>
</head>
<body>
<counter-app><template shadowrootmode="open"><style>:host { display: block; max-width: 28rem; margin: 3rem auto; padding: 1.5rem 2rem; border-radius: 12px; background: #fff; box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08); font-family: system-ui, -apple-system, sans-serif; color: #1b1b1f; }
h1 { margin: 0px 0px 0.5rem; font-size: 1.4rem; }
p { color: #555; }
button { font-size: 1rem; padding: 0.5rem 1rem; border: 0px; border-radius: 8px; background: #6750a4; color: #fff; cursor: pointer; }
.count { font-variant-numeric: tabular-nums; font-weight: 700; }</style>
      <h1>SSG + hydration demo</h1>
      <p>
        This markup was server-rendered (Declarative Shadow DOM); the client
        bundle hydrated it so the button works.
      </p>
      <p>count: <span class="count">0</span></p>
      <button>increment</button>
    </template></counter-app>
<script src="./app.js"></script>
</body>
</html>
