<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vite × React × Vue × our WC (SSR/SSG)</title>
<style>
  body { font: 15px/1.5 system-ui, sans-serif; margin: 2rem auto; max-width: 980px; color: #18181b; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .card { border: 1px solid #e4e4e7; border-radius: 12px; padding: 14px 16px; }
  .card h3 { margin: 0 0 6px; }
</style>
</head>
<body>
<h1>Server-rendered, then hydrated — three frameworks</h1>
<p>This whole page is HTML before any JS runs. <code>/hydrate.js</code> then
   hydrates React &amp; Vue and upgrades the custom elements.</p>
<div class="grid">
  <div id="react"><div class="card"><h3>⚛️ React island</h3><p>React state mirrors the Web Component: <b>2</b></p><dom-stepper value="2"></dom-stepper></div></div>
  <div id="vue"><div class="card"><h3>💚 Vue island</h3><p>Vue state mirrors the Web Component: <b>5</b></p><dom-stepper value="5"></dom-stepper></div></div>
  <div class="card"><our-island start="8"><template shadowrootmode="open"><style>:host { display: block; }
h3 { margin: 0px 0px 6px; }
b { font-variant-numeric: tabular-nums; }</style>
      <h3>🧩 Our framework</h3>
      <p>Our state mirrors the Web Component: <b>8</b></p>
      <dom-stepper><template shadowrootmode="open"><style>:host { display: inline-flex; align-items: center; gap: 10px; padding: 6px 10px; border: 2px solid #6366f1; border-radius: 8px; font: 16px system-ui, sans-serif; }
button { width: 28px; height: 28px; border: 1px solid #a1a1aa; border-radius: 6px; background: #fff; cursor: pointer; font: inherit; }
strong { min-width: 2ch; text-align: center; font-variant-numeric: tabular-nums; }</style>
      <button aria-label="decrement">−</button>
      <strong>8</strong>
      <button aria-label="increment">+</button>
    </template></dom-stepper>
    </template></our-island></div>
</div>
<script type="module" src="/hydrate.js"></script>
</body>
</html>
