name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # push the "Version Packages" PR + tags
  pull-requests: write # open/update the release PR
  id-token: write # npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager (pnpm@10.11.0)
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org # writes ~/.npmrc for NODE_AUTH_TOKEN
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Opens/updates the "Version Packages" PR from pending changesets; when that
      # PR is merged (changesets already applied), runs `ci:publish` to release.
      - uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:publish
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
