name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main] # main is covered by release.yml

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager (pnpm@10.11.0) from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # node:sqlite (orm-sql) needs >= 22.5, stable in 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
